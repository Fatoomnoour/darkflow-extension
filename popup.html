<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px;
      border-bottom: 1px solid #2a2a2a;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #F97316, #FB923C);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-icon svg {
      width: 18px;
      height: 18px;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 700;
    }

    .header span {
      font-size: 11px;
      color: #888;
    }

    .body {
      padding: 16px 18px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 600;
    }

    .toggle {
      width: 44px;
      height: 24px;
      border-radius: 12px;
      background: #333;
      border: none;
      cursor: pointer;
      position: relative;
      transition: background 0.3s;
    }

    .toggle.active { background: #F97316; }

    .toggle::after {
      content: '';
      position: absolute;
      top: 3px;
      right: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    }

    .toggle.active::after {
      transform: translateX(-20px);
    }

    .section-label {
      font-size: 11px;
      color: #888;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .intensity-options {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .intensity-btn {
      flex: 1;
      padding: 8px 4px;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      background: transparent;
      color: #aaa;
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .intensity-btn:hover {
      border-color: #444;
      color: #ddd;
    }

    .intensity-btn.active {
      border-color: #F97316;
      background: rgba(249, 115, 22, 0.1);
      color: #F97316;
    }

    .site-info {
      background: #222;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #888;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .site-info .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22C55E;
      flex-shrink: 0;
    }

    .site-info .dot.off { background: #666; }

    .site-info strong {
      color: #e0e0e0;
      font-weight: 600;
    }

    .footer {
      padding: 12px 18px;
      border-top: 1px solid #2a2a2a;
      text-align: center;
    }

    .footer button {
      background: none;
      border: none;
      color: #F97316;
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .footer button:hover {
      background: rgba(249, 115, 22, 0.1);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 20a25 25 0 1 0 0 50 20 20 0 1 1 0-40z" fill="#fff"/>
      </svg>
    </div>
    <div>
      <h1>DarkFlow</h1>
      <span>الوضع الداكن الذكي</span>
    </div>
  </div>

  <div class="body">
    <div class="toggle-row">
      <span class="toggle-label">تفعيل لهذا الموقع</span>
      <button class="toggle active" id="siteToggle"></button>
    </div>

    <div class="section-label">شدة الوضع الداكن</div>
    <div class="intensity-options">
      <button class="intensity-btn" data-value="low">خفيف</button>
      <button class="intensity-btn" data-value="mid">متوسط</button>
      <button class="intensity-btn active" data-value="full">كامل</button>
    </div>

    <div class="site-info">
      <div class="dot" id="statusDot"></div>
      <span>الموقع الحالي: <strong id="siteName">...</strong></span>
    </div>
  </div>

  <div class="footer">
    <button id="resetBtn">إعادة تعيين جميع المواقع</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
